<header class="site-header">
  <div class="wrap">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <button class="nav-toggle" aria-expanded="false" aria-controls="site-nav">Menu</button>
    <nav id="site-nav" class="site-nav">
      <a href="{{ '/browse.html' | relative_url }}">Browse All</a>
      <a href="{{ '/documents/' | relative_url }}">Documents</a>
      <a href="{{ '/maps/' | relative_url }}">Maps</a>
      <a href="{{ '/articles/' | relative_url }}">Articles</a>
      <a href="{{ '/links/' | relative_url }}">Links</a>
      <a href="https://github.com/{{ site.repository }}" target="_blank" rel="noopener">Contribute</a>
    </nav>
  </div>
</header>
<script>
  document.querySelector('.nav-toggle').addEventListener('click', function () {
    var nav = document.getElementById('site-nav');
    var open = nav.classList.toggle('is-open');
    this.setAttribute('aria-expanded', open);
  });
</script>
